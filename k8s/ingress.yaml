apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: job-scheduler-ingress
  namespace: job-scheduler
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket support.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
spec:
  ingressClassName: nginx
  rules:
    - host: job-scheduler.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: job-scheduler-server
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: job-scheduler-server
                port:
                  number: 8080
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: job-scheduler-server
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: job-scheduler-frontend
                port:
                  number: 80
