apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-scheduler-server
  namespace: job-scheduler
  labels:
    app: job-scheduler-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: job-scheduler-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: job-scheduler-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: server
          image: ghcr.io/saikrishnans/job-scheduler-server:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: job-scheduler-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: job-scheduler-server
  namespace: job-scheduler
spec:
  selector:
    app: job-scheduler-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
